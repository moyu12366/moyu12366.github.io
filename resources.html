description: "收集整理的优质资源网站"
header-img: "img/post-bg-universe.jpg"
header-mask: 0.3
---

    <div class="resource-container">
        <!-- 提交资源按钮 -->

            </button>

                🔐 审核面板
            </button>
        </div>

        <!-- 常用网站 -->

        <div class="resource-grid">

                <span class="icon">📧</span>
                <span class="name">QQ邮箱</span>
            </a>
            <a href="https://bilibili.com" target="_blank" class="resource-item">
                <span class="icon">📺</span>
                <span class="name">B站</span>
            </a>
            <a href="https://iconfont.cn" target="_blank" class="resource-item">
                <span class="icon">🎨</span>
                <span class="name">图标库</span>
            </a>
            <a href="https://mail.google.com" target="_blank" class="resource-item">
                <span class="icon">📭</span>
                <span class="name">谷歌邮箱</span>
            </a>
            <a href="https://163.com" target="_blank" class="resource-item">
                <span class="icon">📧</span>
                <span class="name">163邮箱</span>
            </a>
            <a href="https://宝塔面板地址" target="_blank" class="resource-item">

                <span class="name">宝塔面板</span>
            </a>

        <!-- 导航网站 -->
        <h2 id="导航网站">导航网站</h2>
        <div class="resource-grid">
            <a href="https://导航地址1" target="_blank" class="resource-item">
                <span class="icon">🧭</span>
                <span class="name">慌伴导航</span>
            </a>
            <a href="https://导航地址2" target="_blank" class="resource-item">
                <span class="icon">🚀</span>
                <span class="name">开发者导航</span>
            </a>
            <a href="https://导航地址3" target="_blank" class="resource-item">
                <span class="icon">📚</span>
                <span class="name">学吧导航</span>
            </a>
            <a href="https://导航地址4" target="_blank" class="resource-item">
                <span class="icon">🐱</span>
                <span class="name">花猫导航</span>
            </a>
            <a href="https://导航地址5" target="_blank" class="resource-item">
                <span class="icon">💎</span>
                <span class="name">资源导航</span>
            </a>
            <a href="https://导航地址6" target="_blank" class="resource-item">
                <span class="icon">🌐</span>
                <span class="name">新媒派</span>
            </a>
            <a href="https://导航地址7" target="_blank" class="resource-item">

        <!-- 动态加载区域 -->

<!-- 提交资源弹窗 -->
<div id="submitModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px;">
        <h3>📝 提交新资源</h3>
        <div style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">网站名称 *</label>
                <input type="text" id="resourceName" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="例如：GitHub">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">网站链接 *</label>
                <input type="url" id="resourceUrl" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="https://github.com">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">简介（可选）</label>
                <textarea id="resourceDesc" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-height: 60px;" placeholder="简单描述一下这个网站..."></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="submitResource()" class="btn btn-primary">提交</button>
                <button onclick="closeModal('submitModal')" class="btn btn-default">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 审核面板弹窗 -->
<div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
        <h3>🔐 审核面板</h3>
        <div id="adminContent" style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">管理员密码</label>
                <input type="password" id="adminPassword" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="输入密码">
            </div>
            <button onclick="loadPendingResources()" class="btn btn-primary">查看待审核</button>
            <div id="pendingList" style="margin-top: 20px;"></div>
            <div style="margin-top: 20px;">
                <button onclick="closeModal('adminModal')" class="btn btn-default">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
    let ADMIN_PASSWORD = '';

    // 页面加载时获取动态资源
    document.addEventListener('DOMContentLoaded', function() {
        loadDynamicResources();
    });

    let API_BASE = 'https://你的Vercel项目名.vercel.app'; // 部署 Vercel 后改成你的实际地址

    // 加载动态资源
    async function loadDynamicResources() {
        const container = document.getElementById('dynamicResources');
        try {
            const response = await fetch(API_BASE + '/api/resources');
            const result = await response.json();

            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(item => `
                    <a href="${item.url}" target="_blank" class="resource-item">
                        <span class="icon">🌐</span>
                        <span class="name">${item.name}</span>
                    </a>
                `).join('');
            } else {
                container.innerHTML = '<p>暂无用户提交的资源</p>';
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<p>加载失败</p>';
        }
    }

    // 显示提交弹窗
    function showSubmitModal() {
        document.getElementById('submitModal').style.display = 'flex';
    }

    // 显示审核弹窗
    function showAdminModal() {
        document.getElementById('adminModal').style.display = 'flex';
    }

    // 关闭弹窗
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    // 提交资源
    async function submitResource() {
        const name = document.getElementById('resourceName').value.trim();
        const url = document.getElementById('resourceUrl').value.trim();
        const description = document.getElementById('resourceDesc').value.trim();

        if (!name || !url) {
            alert('网站名称和链接不能为空！');
            return;
        }

        try {
            const response = await fetch(API_BASE + '/api/resources', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url, description })
            });

            const result = await response.json();

            if (result.success) {
                alert('提交成功！等待管理员审核');
                closeModal('submitModal');
                document.getElementById('resourceName').value = '';
                document.getElementById('resourceUrl').value = '';
                document.getElementById('resourceDesc').value = '';
            } else {
                alert('提交失败：' + result.error);
            }
        } catch (e) {
            alert('提交失败，请稍后重试');
            console.error(e);
        }
    }

    // 加载待审核资源
    async function loadPendingResources() {
        ADMIN_PASSWORD = document.getElementById('adminPassword').value;
        const container = document.getElementById('pendingList');

        if (!ADMIN_PASSWORD) {
            alert('请输入密码');
            return;
        }

        try {
            const response = await fetch(API_BASE + '/api/approve', {
                method: 'GET',
                headers: { 'x-admin-password': ADMIN_PASSWORD }
            });

            const result = await response.json();

            if (result.success) {
                if (result.data.length === 0) {
                    container.innerHTML = '<p>没有待审核的资源</p>';
                } else {
                    container.innerHTML = result.data.map(item => `
                        <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px;">
                            <h4 style="margin: 0 0 5px 0;">${item.name}</h4>
                            <p style="margin: 5px 0; color: #666;">
                                <a href="${item.url}" target="_blank">${item.url}</a>
                            </p>
                            ${item.description ? `<p style="margin: 5px 0; color: #888;">${item.description}</p>` : ''}
                            <p style="margin: 10px 0 0 0;">
                                <button onclick="approveResource('${item.id}')" class="btn btn-primary">✅ 通过审核</button>
                            </p>
                        </div>
                    `).join('');
                }
            } else {
                alert('加载失败：' + result.error);
            }
        } catch (e) {
            alert('加载失败，请稍后重试');
            console.error(e);
        }
    }

    // 审核通过资源
    async function approveResource(id) {
        try {
            const response = await fetch(API_BASE + '/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password: ADMIN_PASSWORD })
            });

            const result = await response.json();

            if (result.success) {
                alert('审核成功！');
                loadPendingResources();
                loadDynamicResources();
            } else {
                alert('审核失败：' + result.error);
            }
        } catch (e) {
            alert('审核失败，请稍后重试');
            console.error(e);
        }
    }
</script>
